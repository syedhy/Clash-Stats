name: ClashStats
options:
  bundleIdPrefix: com.clashstats
  createIntermediateGroups: true
targets:
  ClashStats:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ClashStatsApp.swift
      - Models
      - Networking
      - Storage
      - ViewModels
      - Views
      - Fonts
      - Assets.xcassets
    info:
      path: ClashStats/Info.plist
      properties:
        UIAppFonts:
          - Clash_Regular.otf
    settings:
      PRODUCT_NAME: "Clash Stats"
      INFOPLIST_KEY_CFBundleDisplayName: "Clash Stats"
      INFOPLIST_KEY_CFBundleName: "Clash Stats"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSAppTransportSecurity: "<dict><key>NSAllowsArbitraryLoads</key><true/></dict>"
      INFOPLIST_KEY_UIRequiresFullScreen: YES
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
      ENABLE_PREVIEWS: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: NO
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
    dependencies:
      - target: ClashStatsWidgets
        embed: true
    entitlements:
      path: ClashStats.entitlements

  ClashStatsWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: ClashStatsWidgets/Info.plist
      properties:
        UIAppFonts:
          - Clash_Regular.otf
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    sources:
      - Widgets
      - Models
      - Storage
      - Networking
      - Fonts
    settings:
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSAppTransportSecurity: "<dict><key>NSAllowsArbitraryLoads</key><true/></dict>"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
      ENABLE_PREVIEWS: YES
      EXCLUDED_ARCHS: ""
      SKIP_INSTALL: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.clashstats.ClashStats.ClashStatsWidgets
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
    entitlements:
      path: ClashStats.entitlements
